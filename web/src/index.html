<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>스켈레톤 경기기록 분석</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛷</text></svg>">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0f2b47">
  <link rel="stylesheet" href="css/notyf.min.css">
  <link rel="stylesheet" href="css/animate.min.css">
  <link rel="stylesheet" href="css/tippy.css">
  <link rel="stylesheet" href="css/tabulator.min.css">
  <link rel="stylesheet" href="css/main.css">
  <script src="js/chart.min.js"></script>
  <script src="js/chartjs-plugin-datalabels.min.js"></script>
  <script src="js/chartjs-plugin-annotation.min.js"></script>
  <script src="js/hammer.min.js"></script>
  <script src="js/chartjs-plugin-zoom.min.js"></script>
</head>
<body>
<a href="#main-content" class="skip-link">본문으로 건너뛰기</a>

<header>
  <h1>🛷 스켈레톤 경기기록 분석</h1>
  <p class="header-sub">평창 알펜시아 슬라이딩 센터 · 2025-26 시즌</p>
  <div class="tabs-wrapper">
    <nav class="tabs" role="tablist">
      <button class="tab-btn active" data-tab="prediction" role="tab" aria-selected="true">예측 모델</button>
      <button class="tab-btn" data-tab="analysis" role="tab" aria-selected="false">선수 분석</button>
      <button class="tab-btn" data-tab="compare" role="tab" aria-selected="false">선수 비교</button>
      <button class="tab-btn" data-tab="explore" role="tab" aria-selected="false">데이터 탐색</button>
      <button class="tab-btn" data-tab="trackmap" role="tab" aria-selected="false">트랙 맵</button>
    </nav>
  </div>
</header>

<main id="main-content">

  <!-- ── Tab 1: 예측 모델 ── -->
  <section id="tab-prediction" class="tab-content active" role="tabpanel">
    <h2 class="sr-only">예측 모델</h2>
    <div class="panel">
      <select id="pred-gender-filter" aria-label="성별 필터" class="filter-select-sm">
        <option value="">전체 성별</option>
      </select>
      <select id="pred-nat-filter" aria-label="국가 필터" class="filter-select-sm">
        <option value="">전체 국가</option>
      </select>
      <select id="pred-player-select" aria-label="선수 선택" class="filter-select-sm"></select>
      <select id="pred-model-select" aria-label="모델 선택">
        <option value="simple">단순 선형</option>
        <option value="multi">다중 선형</option>
        <option value="segment">구간별 가중</option>
      </select>
      <button id="pred-run-btn" class="primary-btn">예측 실행</button>
    </div>

    <!-- 모델별 입력 패널 -->
    <div id="pred-simple-inputs" class="panel">
      <label>스타트 시간 (초):
        <input id="pred-start-input" type="number" step="0.001" min="3" max="8" placeholder="예: 5.123">
      </label>
    </div>

    <div id="pred-multi-inputs" class="panel hidden">
      <div style="display:flex;flex-wrap:wrap;gap:0.5rem;align-items:flex-end">
        <label>스타트 (초):<input id="pred-m-start" type="number" step="0.001" placeholder="5.12" style="width:80px"></label>
        <label>구간1 (초):<input id="pred-m-seg1" type="number" step="0.001" placeholder="9.5" style="width:80px"></label>
        <label>구간2 (초):<input id="pred-m-seg2" type="number" step="0.001" placeholder="9.3" style="width:80px"></label>
        <label>구간3 (초):<input id="pred-m-seg3" type="number" step="0.001" placeholder="10.8" style="width:80px"></label>
        <label>구간4 (초):<input id="pred-m-seg4" type="number" step="0.001" placeholder="11.2" style="width:80px"></label>
      </div>
      <p style="font-size:0.8em;color:#888;margin-top:0.3rem">※ 구간 시간 = 해당 구간의 소요 시간 (누적 아님)</p>
    </div>

    <div id="pred-segment-inputs" class="panel hidden">
      <label>기준 구간:
        <select id="pred-seg-type" aria-label="기준 구간 선택">
          <option value="fromInt4">Int.4 (15번 커브, 가장 정확)</option>
          <option value="fromInt3">Int.3 (12번 커브)</option>
          <option value="fromInt2">Int.2 (7번 커브)</option>
          <option value="fromInt1">Int.1 (4번 커브)</option>
        </select>
      </label>
      <label>실측 누적 시간 (초):
        <input id="pred-seg-value" type="number" step="0.001" placeholder="예: 45.200">
      </label>
    </div>

    <!-- 모델 비교 카드 -->
    <div id="pred-model-compare" class="result-panel" style="display:none"></div>

    <div class="result-panel" id="pred-result">
      <div class="empty-state" role="status"><div class="empty-state-icon" aria-hidden="true">🛷</div><div class="empty-state-text">선수를 선택하고 예측을 실행하세요</div></div>
    </div>
    <canvas id="pred-chart" style="display:none" role="img" aria-label="차트"></canvas>
  </section>

  <!-- ── Tab 2: 선수 분석 ── -->
  <section id="tab-analysis" class="tab-content" role="tabpanel">
    <h2 class="sr-only">선수 분석</h2>
    <div class="panel">
      <select id="analysis-gender-filter" aria-label="성별 필터" class="filter-select-sm">
        <option value="">전체 성별</option>
      </select>
      <select id="analysis-nat-filter" aria-label="국가 필터" class="filter-select-sm">
        <option value="">전체 국가</option>
      </select>
      <select id="analysis-player-select" aria-label="분석 선수 선택" class="filter-select-sm"></select>
    </div>
    <div class="stats-grid" id="analysis-stats">
      <div class="empty-state" role="status"><div class="empty-state-icon" aria-hidden="true">📊</div><div class="empty-state-text">선수를 선택하면 상세 분석을 확인할 수 있습니다</div></div>
    </div>
    <canvas id="analysis-trend-chart" style="display:none" role="img" aria-label="차트"></canvas>
    <canvas id="analysis-split-chart" style="display:none" role="img" aria-label="차트"></canvas>
    <canvas id="analysis-weather-chart" style="display:none" role="img" aria-label="차트"></canvas>
    <canvas id="analysis-boxplot-chart" style="display:none" role="img" aria-label="차트"></canvas>
    <div id="analysis-extra"></div>
    <div id="analysis-table"></div>
  </section>

  <!-- ── Tab 3: 선수 비교 ── -->
  <section id="tab-compare" class="tab-content" role="tabpanel">
    <h2 class="sr-only">선수 비교</h2>
    <div id="compare-player-checkboxes"></div>
    <p id="compare-msg" class="text-danger" style="margin-bottom:0.5rem"></p>
    <canvas id="compare-bar-chart" style="display:none" role="img" aria-label="차트"></canvas>
    <canvas id="compare-radar-chart" style="display:none" role="img" aria-label="차트"></canvas>
    <div id="compare-table"></div>
  </section>

  <!-- ── Tab 4: 데이터 탐색 ── -->
  <section id="tab-explore" class="tab-content" role="tabpanel">
    <h2 class="sr-only">데이터 탐색</h2>
    <div class="panel">
      <select id="explore-gender-filter" aria-label="성별 필터" class="filter-select-sm">
        <option value="">전체 성별</option>
      </select>
      <select id="explore-nat-filter" aria-label="국가 필터" class="filter-select-sm">
        <option value="">전체 국가</option>
      </select>
      <select id="explore-player-filter" aria-label="선수 필터" class="filter-select-sm"></select>
      <select id="explore-session-filter" aria-label="세션 필터"></select>
      <select id="explore-status-filter" aria-label="상태 필터"></select>
    </div>
    <div id="explore-table"></div>
  </section>

  <!-- ── Tab 5: 트랙 맵 ── -->
  <section id="tab-trackmap" class="tab-content" role="tabpanel">
    <h2 class="sr-only">트랙맵</h2>
    <div class="trackmap-layout">
      <!-- 좌측: 트랙 시각화 -->
      <div class="trackmap-main">
        <div class="panel" style="margin-bottom:0.5rem">
          <select id="trackmap-gender-filter" aria-label="성별 필터" class="filter-select-sm">
            <option value="">전체 성별</option>
          </select>
          <select id="trackmap-nat-filter" aria-label="국가 필터" class="filter-select-sm">
            <option value="">전체 국가</option>
          </select>
          <select id="trackmap-player-select" aria-label="트랙맵 선수 선택" class="filter-select-sm"></select>
          <select id="trackmap-run-select" aria-label="트랙맵 기록 선택 (선수 선택 후 활성화)" disabled>
            <option value="">-- 기록 선택 --</option>
          </select>
        </div>
        <div id="track-map-container" class="track-map-card"></div>
      </div>
      <!-- 우측: 분석 사이드 패널 -->
      <div class="trackmap-side">
        <div class="tm-tabs">
          <div class="tm-tab active" data-tmtab="splits">구간 분석</div>
          <div class="tm-tab" data-tmtab="curves">커브 난이도</div>
          <div class="tm-tab" data-tmtab="temp">온도 영향</div>
        </div>
        <div class="tm-tab-content active" id="tmtab-splits">
          <div id="tm-section-cards"></div>
          <div id="tm-insight-cards"></div>
        </div>
        <div class="tm-tab-content" id="tmtab-curves">
          <div id="tm-curve-analysis"></div>
        </div>
        <div class="tm-tab-content" id="tmtab-temp">
          <div id="tm-temp-analysis"></div>
        </div>
      </div>
    </div>
  </section>

</main>

<footer>
  평창 알펜시아 슬라이딩 센터 · 2025-26 시즌 스켈레톤 경기기록 데이터<br>
  데이터 출처: IBSF / 대한봅슬레이스켈레톤경기연맹
</footer>

<!-- 모달 오버레이 -->
<div id="explore-overlay" class="modal-overlay hidden"></div>
<!-- 상세 기록 모달 -->
<div id="explore-modal" class="modal hidden"></div>

<script src="js/notyf.min.js"></script>
<!-- html2canvas + jsPDF: lazy loaded on button click -->
<script src="js/papaparse.min.js"></script>
<script src="js/popper.min.js"></script>
<script src="js/tippy-bundle.umd.min.js"></script>
<script src="js/sortable.min.js"></script>
<script src="js/confetti.min.js"></script>
<script src="js/simple-statistics.min.js"></script>
<script src="js/luxon.min.js"></script>
<script src="js/d3.min.js"></script>
<script src="js/tabulator.min.js"></script>
<!-- xlsx.min.js: lazy loaded on XLSX export -->
<script src="js/supabase-data.js"></script>
<script src="js/DataStore.js"></script>
<script src="js/PlayerAnalyzer.js"></script>
<script src="js/PredictionModel.js"></script>
<script src="js/ChartManager.js"></script>
<script src="js/TableRenderer.js"></script>
<script src="js/TrackMapRenderer.js"></script>
<script src="js/UIController.js"></script>

</body>
</html>
